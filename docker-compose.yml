services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage

  postgresql:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: emotionrag
      POSTGRES_USER: emotionrag
      POSTGRES_PASSWORD: dev_password_change_me
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  emotion-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.emotion-engine
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: 50051
      RUST_LOG: info,emotion_engine=debug
    depends_on:
      - redis

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: 8080
      EMOTION_ENGINE_ADDR: emotion-engine:50051
      QDRANT_ADDR: qdrant:6334
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://emotionrag:dev_password_change_me@postgresql:5432/emotionrag?sslmode=disable
      PYTHON_ML_URL: http://python-ml:8090
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3.5-27B}
      LLM_SYSTEM_PROMPT: ${LLM_SYSTEM_PROMPT:-You are a concise and emotionally coherent assistant. Reply briefly, helpfully, and stay aligned with the provided emotional context.}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-256}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TOP_P: ${LLM_TOP_P:-0.8}
      LLM_TOP_K: ${LLM_TOP_K:-20}
      LLM_PRESENCE_PENALTY: ${LLM_PRESENCE_PENALTY:-0.0}
      LLM_ENABLE_THINKING: ${LLM_ENABLE_THINKING:-false}
    depends_on:
      - emotion-engine
      - qdrant
      - postgresql
      - redis
      - python-ml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  python-ml:
    build:
      context: .
      dockerfile: docker/Dockerfile.python-ml
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      MODEL_NAME: monologg/bert-base-cased-goemotions-original
      EMBEDDING_MODEL: all-MiniLM-L6-v2

volumes:
  qdrant_data:
  pg_data:
